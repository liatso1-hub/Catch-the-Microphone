<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תפוס את המיקרופון!</title>
    <!-- טעינת Tailwind CSS לעיצוב -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- טעינת React ו-ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap');
        body { font-family: 'Rubik', sans-serif; }
    </style>
</head>
<body class="bg-[#E0F2FE]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // איקון מיקרופון מובנה ללא תלויות חיצוניות
        const MicIcon = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" x2="12" y1="19" y2="22"/>
            </svg>
        );

        function App() {
            const [timeLeft, setTimeLeft] = useState(20);
            const [currentWord, setCurrentWord] = useState('שמש');

            // רשימת מילים פשוטה - ניתן להוסיף עוד
            const wordList = ['לב', 'שמש', 'מים', 'חבר', 'קסם', 'אור', 'ים', 'פרח'];

            useEffect(() => {
                if (timeLeft > 0) {
                    const timerId = setTimeout(() => setTimeLeft(timeLeft - 1), 1000);
                    return () => clearTimeout(timerId);
                }
            }, [timeLeft]);

            const nextWord = () => {
                const randomWord = wordList[Math.floor(Math.random() * wordList.length)];
                setCurrentWord(randomWord);
                setTimeLeft(20);
            };

            const radius = 45;
            const circumference = 2 * Math.PI * radius;
            const strokeDashoffset = circumference - (timeLeft / 20) * circumference;

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="bg-white rounded-[3rem] shadow-[0_10px_40px_rgba(0,0,0,0.05)] w-full max-w-2xl p-8 sm:p-14 flex flex-col items-center gap-8 text-center">
                        
                        <div className="bg-[#F0F9FF] p-5 rounded-full mb-2">
                            <MicIcon className="w-14 h-14 text-[#7DD3FC]" />
                        </div>

                        <div className="flex flex-col items-center gap-3 w-full">
                            <h2 className="text-2xl sm:text-3xl font-medium text-slate-600">תור קבוצה 1</h2>
                            
                            <h1 className="text-8xl sm:text-[8rem] font-black text-[#1E3A8A] leading-none tracking-tight py-2 min-h-[150px] flex items-center justify-center">
                                {timeLeft > 0 ? currentWord : <span className="text-red-500 animate-bounce">STOP</span>}
                            </h1>
                            
                            <p className="text-xl sm:text-2xl font-medium text-slate-600">הקבוצה צריכה לשיר...</p>
                        </div>

                        <div className="flex flex-col items-center gap-4 mt-4">
                            {timeLeft > 0 ? (
                                <div className="relative w-36 h-36 flex items-center justify-center">
                                    <svg className="absolute inset-0 w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                                        <circle cx="50" cy="50" r={radius} className="stroke-[#FDBA74]" strokeWidth="10" fill="none" />
                                        <circle cx="50" cy="50" r={radius} className="stroke-[#4ADE80] transition-all duration-1000 ease-linear" strokeWidth="10" fill="none" strokeDasharray={circumference} strokeDashoffset={strokeDashoffset} strokeLinecap="round" />
                                    </svg>
                                    <span className="text-4xl font-bold text-slate-700">{timeLeft}</span>
                                </div>
                            ) : (
                                <div className="w-36 h-36 flex items-center justify-center bg-red-100 rounded-full animate-pulse border-4 border-red-200">
                                    <span className="text-3xl font-black text-red-600">סיום</span>
                                </div>
                            )}
                        </div>

                        <div className="flex flex-col w-full gap-5 mt-8">
                            <div className="flex flex-col sm:flex-row w-full gap-5">
                                <button onClick={nextWord} className="flex-1 bg-[#4ADE80] hover:bg-[#22C55E] text-white text-2xl font-bold py-6 rounded-[2rem] transition-transform active:scale-95 shadow-md">שרו נהדר! ✅</button>
                                <button onClick={nextWord} className="flex-1 bg-[#FCA5A5] hover:bg-[#F87171] text-white text-2xl font-bold py-6 rounded-[2rem] transition-transform active:scale-95 shadow-md">מעבירים את השרביט 🔄</button>
                            </div>
                            <button onClick={nextWord} className="w-full bg-[#F0F9FF] text-[#3B82F6] text-xl font-bold py-4 rounded-[2rem] hover:bg-[#E0F2FE]">מילה הבאה ⏭️</button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
